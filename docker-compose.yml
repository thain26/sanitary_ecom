version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sanitary_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: sanitary_ecom
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sanitary_redis
    ports:
      - "6379:6379"
    restart: unless-stopped



volumes:
  postgres_data:
